fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"] # Prevents accidental commitment of local model weights

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json]
        exclude: ^specs/.*\.json$ # We don't want to reformat the raw provider specs

  - repo: local
    hooks:
      # 1. Rust Format: The first line of defense
      - id: cargo-fmt
        name: Cargo Format
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      # 2. Clippy: The "Superior" Linter
      - id: cargo-clippy
        name: Cargo Clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      # 3. Deny-by-Default: License and Dependency Audit
      - id: cargo-deny
        name: Cargo Deny (Licenses/Advisories)
        entry: cargo deny check
        language: system
        files: ^Cargo\.toml$
        pass_filenames: false

      # 4. Schema Integrity: Ensure local specs haven't drifted
      - id: spec-audit
        name: Audit AI Provider Specs
        entry: cargo run --bin audit-specs
        language: system
        files: ^specs/.*\.json$
        pass_filenames: false

      # 5. Lockfile Consistency
      - id: cargo-lock-check
        name: Check Cargo.lock consistency
        entry: cargo fetch --locked
        language: system
        files: ^(Cargo\.toml|Cargo\.lock)$
        pass_filenames: false
